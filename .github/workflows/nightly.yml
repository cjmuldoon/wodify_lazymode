name: Nightly Wodify Check

on:
  schedule:
    # 12:00 UTC = 10 PM AEST (UTC+10) / 11 PM AEDT (UTC+11)
    # Adjust to 11:00 UTC during daylight saving if needed
    - cron: '0 12 * * *'
  workflow_dispatch:  # Manual trigger for testing

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to commit workouts.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Wodify scraper
        env:
          WODIFY_EMAIL: ${{ secrets.WODIFY_EMAIL }}
          WODIFY_PASSWORD: ${{ secrets.WODIFY_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Commit updated workouts
        run: |
          git config user.name "wodify-bot"
          git config user.email "bot@wodify-lazymode"
          git add data/workouts.json
          git diff --cached --quiet || git commit -m "chore: update workouts $(date -u +%Y-%m-%d)"
          git push
