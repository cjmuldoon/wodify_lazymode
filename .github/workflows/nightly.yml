name: Nightly Wodify Check

on:
  schedule:
    # All times AEDT (UTC+11, Oct–Apr). When clocks go back to AEST (UTC+10)
    # in early April, add 1 to each UTC hour below.
    #
    # Mon–Sat: 6 PM AEDT = 07:00 UTC
    - cron: '0 7 * * 1-6'
    # Sunday: hourly 2 PM–11 PM AEDT = 03:00–12:00 UTC
    - cron: '0 3-12 * * 0'
  workflow_dispatch:
    inputs:
      force_notify:
        description: 'Send Telegram for all current workouts regardless of changes'
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to commit workouts.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Determine notify mode
        run: |
          DAY=$(date -u +%u)   # 1=Mon … 7=Sun
          HOUR=$(date -u +%H)  # UTC hour (00–23)
          INPUT_FORCE="${{ github.event.inputs.force_notify }}"
          # Force full-week summary on the final Sunday run (12:00 UTC = 11 PM AEDT)
          # or when manually triggered with force_notify=true
          if [ "$INPUT_FORCE" = "true" ] || { [ "$DAY" = "7" ] && [ "$HOUR" = "12" ]; }; then
            echo "FORCE_NOTIFY=true" >> $GITHUB_ENV
          else
            echo "FORCE_NOTIFY=false" >> $GITHUB_ENV
          fi

      - name: Run Wodify scraper
        env:
          WODIFY_EMAIL: ${{ secrets.WODIFY_EMAIL }}
          WODIFY_PASSWORD: ${{ secrets.WODIFY_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_NOTIFY: ${{ env.FORCE_NOTIFY }}
        run: python main.py

      - name: Commit updated workouts
        run: |
          git config user.name "wodify-bot"
          git config user.email "bot@wodify-lazymode"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update workouts $(date -u +%Y-%m-%d)"
          git push
